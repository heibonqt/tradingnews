name: USD ForexFactory Weekly Screenshot

on:
  schedule:
    # Runs every Monday at 08:00 UTC. Adjust to your timezone (cron is UTC).
    # Use https://crontab.guru to check the schedule.
    - cron: '0 8 * * 1'
  workflow_dispatch: {} # allows manual "Run workflow" button in GitHub UI too

jobs:
  screenshot-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node ff-usd-screenshot.js

      - name: Upload debug screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug-fullpage.png
          if-no-files-found: ignore
